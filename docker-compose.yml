services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinelx}
      POSTGRES_USER: ${POSTGRES_USER:-sentinelx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_only_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  clickhouse:
    image: clickhouse/clickhouse-server:24.6-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./infra/clickhouse/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  gateway:
    build: ./gateway
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      EVENT_STREAM: ${EVENT_STREAM:-sentinelx.events}
    depends_on:
      - redis
    ports:
      - "8000:8000"

  detection-engine:
    build: ./detection-engine
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://sentinelx:sentinelx@postgres:5432/sentinelx}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      EVENT_STREAM: ${EVENT_STREAM:-sentinelx.events}
    depends_on:
      - redis
      - postgres

  api-backend:
    build: ./api-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://sentinelx:sentinelx@postgres:5432/sentinelx}
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  dashboard:
    build: ./dashboard
    environment:
      VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
      VITE_DEMO_MODE: ${DEMO_MODE:-true}
    depends_on:
      - api-backend
    ports:
      - "5173:5173"

volumes:
  postgres-data:
  clickhouse-data:
# Project version: SentinelX V1.6
